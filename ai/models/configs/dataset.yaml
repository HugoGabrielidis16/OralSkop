# OralSkop — AlphaDent dental segmentation dataset (YOLO format)
# 1237 train / 83 val / 135 test  |  9 classes
# Used by models/yolo/train.py and models/unet/train.py

path: ai/dataset/AlphaDent   # relative to project root (where run.py lives)

train: train/images
val:   val/images
test:  test/images

# 9 classes — caries split into 6 severity levels by the original annotators
nc: 9
names:
  0: abrasion
  1: filling
  2: crown
  3: caries_1        # early / initial caries
  4: caries_2
  5: caries_3
  6: caries_4
  7: caries_5
  8: caries_6        # severe / advanced caries
