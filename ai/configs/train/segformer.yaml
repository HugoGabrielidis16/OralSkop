# SegFormer/MiT semantic-segmentation contender.
# Requires: uv sync --extra explore

datasets: [alphadent]
split_train: train
split_val: val

arch: segformer_mit_b2
pretrained: true

imgsz: 512
epochs: 50
batch: 12
lr: 0.00006
weight_decay: 0.01
optimizer: adamw
scheduler: cosine
warmup_epochs: 3
min_lr_factor: 0.05
poly_power: 0.9
loss: ce_dice
aug: strong
workers: 8
device: 0
amp: true
aux_loss_weight: 0.0
class_weights: auto
lora: false
lora_r: 8
lora_alpha: 16
lora_targets: null
val_interval: 1
progress: true
log_per_class: true
save_model: true
seed: 42

out: runs/seg
name: segformer_mit_b2_alphadent
exist_ok: false

wandb: false
wandb_project: oralskop-seg
wandb_entity: null
wandb_images: 8
